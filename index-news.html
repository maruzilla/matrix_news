<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Simple News Reader</title>
    <style>
        /* 背景はダークグレー、文字は緑色 */
        body {
            background-color: #2c2c2c;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
        }
        h1 { border-bottom: 1px solid #00ff00; padding-bottom: 10px; }
        .news-item { margin-bottom: 15px; list-style: none; }
        a { color: #00ff00; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Latest News</h1>
    <ul id="news-list">読み込み中...</ul>

    <script>
        // Google ニュース RSS の URL (日本版・主要ニュース)
        const rssUrl = 'https://news.google.com';
        
        // CORS回避とJSON変換のために rss2json API を使用 (登録不要の無料枠を利用)
        const apiUrl = `https://api.rss2json.com{encodeURIComponent(rssUrl)}`;

        async function fetchNews() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                const list = document.getElementById('news-list');
                list.innerHTML = ''; // 「読み込み中」を消去

                // ニュース項目をループで表示
                data.items.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'news-item';
                    li.innerHTML = `> <a href="${item.link}" target="_blank">${item.title}</a>`;
                    list.appendChild(li);
                });
            } catch (error) {
                document.getElementById('news-list').innerText = 'ニュースの取得に失敗しました。';
                console.error('Error:', error);
            }
        }

        // 実行
        fetchNews();
    </script>
</body>
</html>
